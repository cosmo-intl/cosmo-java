name: API docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Build Javadoc
        # doclint=none: don't fail generation on missing-@param style warnings.
        run: mvn -q -DskipTests -Ddoclint=none -Dmaven.javadoc.failOnError=false javadoc:javadoc
      - name: Collect apidocs
        run: |
          src=$(find target -type d -name apidocs | head -1)
          echo "apidocs at: $src"
          mkdir -p site && cp -r "$src"/. site/
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
